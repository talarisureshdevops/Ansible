

- name: demo on data types
  hosts: local
  connection: local
  vars:
    PROGRAM: "DevSecOps with AWS"
    DURATION: 140
    IS_LIVE: true
    DETAILS:
      MONTHS: 4
      TRAINER: "SivaKumar"
    TOPICS:
      - Linux
      - shell
      - ansible

  tasks:
    - name: print the variables
      ansible.builtin.debug:
        msg:
          program: "{{ PROGRAM }}"
          Duration: "{{ DURATION }}"
          Is live?: "{{ IS_LIVE }}"
          Details: "{{ DETAILS }}"
          Topics: "{{ TOPICS }}"